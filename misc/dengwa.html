<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.0/dist/echarts.min.js"></script>
    <title>Title</title>
</head>
<body>
    <h1>黄娃爱邓娃，邓娃最棒棒</h1>
    <h2>邓娃晚安安</h2>
    <div id="chart_heart" style="width: 370px; height: 400px"></div>
</body>
<script>
    const data = [];
    for (var i = 0; i < 360; i++) {
        const t = i * Math.PI / 180.0;
        const x = 16.0 * Math.pow(Math.sin(t), 3);
        const y = 13.0 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        data.push([x, y]);
    }
</script>
<script>
    const chart_heart = echarts.init(document.getElementById("chart_heart"));
    const chart_option = {
        xAxis: { min: -20, max: 20 },
        yAxis: { min: -20, max: 20 },
        series: [
            {
                type: "line",
                showSymbol: false,
                data,
                color: "red",
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        {
                            offset: 0,
                            color: 'rgba(213,72,120,0.8)'
                        },
                        {
                            offset: 1,
                            color: 'rgba(213,72,120,0.3)'
                        }
                    ])
                },
            }
        ]
    }
    chart_heart.setOption(chart_option)
</script>
</html>
